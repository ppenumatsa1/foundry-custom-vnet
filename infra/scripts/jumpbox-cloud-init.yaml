#cloud-config
package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - apt-transport-https
  - lsb-release
  - gnupg
  - software-properties-common
  - git
  - python3
  - python3-pip
  - build-essential
runcmd:
  - [bash, -lc, "set -euo pipefail"]
  - [bash, -lc, "# Install Python 3.11 and make it the default python3"]
  - [bash, -lc, "add-apt-repository -y ppa:deadsnakes/ppa"]
  - [
      bash,
      -lc,
      "apt-get update && apt-get install -y python3.11 python3.11-venv",
    ]
  - [
      bash,
      -lc,
      "curl -fsSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py && python3.11 /tmp/get-pip.py && rm -f /tmp/get-pip.py",
    ]
  - [
      bash,
      -lc,
      "update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 2",
    ]
  - [bash, -lc, "# Install Node.js (LTS) and npm via NodeSource"]
  - [bash, -lc, "curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -"]
  - [bash, -lc, "apt-get install -y nodejs"]
  - [bash, -lc, "# Install Azure CLI"]
  - [
      bash,
      -lc,
      "curl -sL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /usr/share/keyrings/microsoft.gpg",
    ]
  - [
      bash,
      -lc,
      'echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/azure-cli/ $(lsb_release -cs) main" > /etc/apt/sources.list.d/azure-cli.list',
    ]
  - [bash, -lc, "apt-get update && apt-get install -y azure-cli"]
  - [bash, -lc, "# Install azd (Azure Developer CLI)"]
  - [bash, -lc, "curl -fsSL https://aka.ms/install-azd.sh | bash"]
  - [bash, -lc, "# Ensure pip, npm are up to date"]
  - [bash, -lc, "python3 -m pip install --upgrade pip setuptools"]
  - [bash, -lc, "npm install -g npm@latest"]
final_message: "Jumpbox bootstrap complete"
